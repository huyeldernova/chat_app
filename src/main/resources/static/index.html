<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg: #0d0d0d;
          --surface: #161616;
          --surface2: #1f1f1f;
          --border: #2a2a2a;
          --accent: #00ff88;
          --accent2: #0099ff;
          --text: #e8e8e8;
          --text2: #888;
          --danger: #ff4444;
          --mono: 'IBM Plex Mono', monospace;
          --sans: 'IBM Plex Sans', sans-serif;
        }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: var(--sans);
          height: 100vh;
          display: flex;
          flex-direction: column;
          overflow: hidden;
        }

        /* ── HEADER ── */
        header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 14px 24px;
          border-bottom: 1px solid var(--border);
          background: var(--surface);
          flex-shrink: 0;
        }
        .logo {
          font-family: var(--mono);
          font-size: 15px;
          font-weight: 500;
          color: var(--accent);
          letter-spacing: 0.05em;
        }
        .status-dot {
          width: 8px; height: 8px;
          border-radius: 50%;
          background: var(--danger);
          display: inline-block;
          margin-right: 8px;
          transition: background 0.3s;
        }
        .status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .status-text { font-size: 12px; color: var(--text2); font-family: var(--mono); }

        /* ── LOGIN SCREEN ── */
        #login-screen {
          flex: 1;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .login-box {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 12px;
          padding: 36px 40px;
          width: 360px;
        }
        .login-box h2 {
          font-family: var(--mono);
          font-size: 18px;
          color: var(--accent);
          margin-bottom: 6px;
        }
        .login-box p {
          font-size: 13px;
          color: var(--text2);
          margin-bottom: 24px;
        }
        .input-group { margin-bottom: 16px; }
        .input-group label {
          display: block;
          font-size: 11px;
          font-family: var(--mono);
          color: var(--text2);
          margin-bottom: 6px;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }
        input[type="text"] {
          width: 100%;
          background: var(--surface2);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 10px 14px;
          color: var(--text);
          font-family: var(--mono);
          font-size: 14px;
          outline: none;
          transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }

        .btn {
          width: 100%;
          padding: 11px;
          background: var(--accent);
          color: #000;
          border: none;
          border-radius: 8px;
          font-family: var(--mono);
          font-size: 14px;
          font-weight: 500;
          cursor: pointer;
          transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── MAIN LAYOUT ── */
        #main-screen {
          display: none;
          flex: 1;
          overflow: hidden;
          flex-direction: row;
        }
        #main-screen.show { display: flex; }

        /* ── SIDEBAR ── */
        .sidebar {
          width: 220px;
          background: var(--surface);
          border-right: 1px solid var(--border);
          display: flex;
          flex-direction: column;
          flex-shrink: 0;
        }
        .sidebar-section {
          padding: 16px;
          border-bottom: 1px solid var(--border);
        }
        .sidebar-label {
          font-size: 10px;
          font-family: var(--mono);
          color: var(--text2);
          text-transform: uppercase;
          letter-spacing: 0.1em;
          margin-bottom: 10px;
        }
        .room-btn {
          display: block;
          width: 100%;
          text-align: left;
          background: none;
          border: 1px solid transparent;
          border-radius: 8px;
          padding: 8px 12px;
          color: var(--text2);
          font-family: var(--mono);
          font-size: 13px;
          cursor: pointer;
          transition: all 0.15s;
          margin-bottom: 4px;
        }
        .room-btn:hover { color: var(--text); background: var(--surface2); }
        .room-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,255,136,0.05); }

        .user-info {
          padding: 16px;
          margin-top: auto;
          border-top: 1px solid var(--border);
        }
        .user-badge {
          font-family: var(--mono);
          font-size: 12px;
          color: var(--text2);
        }
        .user-badge span { color: var(--accent2); }

        /* ── CHAT AREA ── */
        .chat-area {
          flex: 1;
          display: flex;
          flex-direction: column;
          overflow: hidden;
        }

        .chat-header {
          padding: 14px 20px;
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: center;
          gap: 10px;
          flex-shrink: 0;
        }
        .chat-header-title {
          font-family: var(--mono);
          font-size: 14px;
          color: var(--text);
        }
        .chat-header-sub {
          font-size: 12px;
          color: var(--text2);
          margin-left: auto;
        }

        /* ── MESSAGES ── */
        #messages {
          flex: 1;
          overflow-y: auto;
          padding: 20px;
          display: flex;
          flex-direction: column;
          gap: 12px;
        }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .msg {
          display: flex;
          flex-direction: column;
          max-width: 72%;
          animation: fadeUp 0.2s ease;
        }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .msg.self { align-self: flex-end; align-items: flex-end; }
        .msg.other { align-self: flex-start; }
        .msg.system { align-self: center; max-width: 100%; }

        .msg-meta {
          font-size: 11px;
          font-family: var(--mono);
          color: var(--text2);
          margin-bottom: 4px;
          padding: 0 4px;
        }
        .msg-bubble {
          padding: 10px 14px;
          border-radius: 12px;
          font-size: 14px;
          line-height: 1.5;
          word-break: break-word;
        }
        .msg.self .msg-bubble {
          background: var(--accent);
          color: #000;
          border-bottom-right-radius: 4px;
        }
        .msg.other .msg-bubble {
          background: var(--surface2);
          border: 1px solid var(--border);
          border-bottom-left-radius: 4px;
        }
        .msg.system .msg-bubble {
          background: transparent;
          border: 1px dashed var(--border);
          color: var(--text2);
          font-size: 12px;
          font-family: var(--mono);
          border-radius: 6px;
          padding: 6px 14px;
        }
        .msg.private .msg-bubble {
          background: rgba(0,153,255,0.12);
          border: 1px solid rgba(0,153,255,0.3);
          color: var(--accent2);
        }

        /* ── INPUT AREA ── */
        .input-area {
          padding: 16px 20px;
          border-top: 1px solid var(--border);
          background: var(--surface);
          flex-shrink: 0;
        }

        /* Tab: Group / Private */
        .tab-row {
          display: flex;
          gap: 8px;
          margin-bottom: 12px;
        }
        .tab-btn {
          padding: 5px 14px;
          border-radius: 20px;
          border: 1px solid var(--border);
          background: none;
          color: var(--text2);
          font-family: var(--mono);
          font-size: 12px;
          cursor: pointer;
          transition: all 0.15s;
        }
        .tab-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.07); }
        .tab-btn.active.private { border-color: var(--accent2); color: var(--accent2); background: rgba(0,153,255,0.07); }

        .private-row {
          display: none;
          margin-bottom: 10px;
        }
        .private-row.show { display: flex; gap: 8px; }
        .private-row input {
          flex: 1;
          background: var(--surface2);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 8px 12px;
          color: var(--accent2);
          font-family: var(--mono);
          font-size: 13px;
          outline: none;
        }
        .private-row input:focus { border-color: var(--accent2); }
        .private-row input::placeholder { color: #555; }

        .send-row {
          display: flex;
          gap: 10px;
        }
        .send-row input {
          flex: 1;
          background: var(--surface2);
          border: 1px solid var(--border);
          border-radius: 10px;
          padding: 11px 16px;
          color: var(--text);
          font-family: var(--sans);
          font-size: 14px;
          outline: none;
          transition: border-color 0.2s;
        }
        .send-row input:focus { border-color: var(--accent); }
        .send-btn {
          padding: 11px 20px;
          background: var(--accent);
          color: #000;
          border: none;
          border-radius: 10px;
          font-family: var(--mono);
          font-size: 13px;
          font-weight: 500;
          cursor: pointer;
          transition: opacity 0.2s;
          white-space: nowrap;
        }
        .send-btn:hover { opacity: 0.85; }
        .send-btn.private { background: var(--accent2); }
    </style>
</head>
<body>

<header>
    <div class="logo">// chat.app</div>
    <div>
        <span class="status-dot" id="dot"></span>
        <span class="status-text" id="status-text">disconnected</span>
    </div>
</header>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <h2>_connect</h2>
        <p>Nhập username để bắt đầu chat</p>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username-input" placeholder="vd: userA" />
        </div>
        <div class="input-group">
            <label>Room</label>
            <input type="text" id="room-input" placeholder="vd: room1" value="room1" />
        </div>
        <button class="btn" id="connect-btn" onclick="connect()">Connect</button>
    </div>
</div>

<!-- MAIN -->
<div id="main-screen">
    <div class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-label">Rooms</div>
            <button class="room-btn active" id="room-tag">#room1</button>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Channels</div>
            <button class="room-btn" onclick="setTab('private')">@ private</button>
        </div>
        <div class="user-info">
            <div class="user-badge">logged in as<br><span id="current-user">—</span></div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <span class="chat-header-title" id="chat-title">#room1</span>
            <span class="chat-header-sub" id="chat-sub">group chat</span>
        </div>

        <div id="messages"></div>

        <div class="input-area">
            <div class="tab-row">
                <button class="tab-btn active" id="tab-group" onclick="setTab('group')">Group</button>
                <button class="tab-btn private" id="tab-private" onclick="setTab('private')">Private</button>
            </div>

            <div class="private-row" id="private-row">
                <input type="text" id="receiver-input" placeholder="Gửi đến: username..." />
            </div>

            <div class="send-row">
                <input type="text" id="msg-input" placeholder="Nhập tin nhắn..." onkeydown="if(event.key==='Enter') sendMessage()" />
                <button class="send-btn" id="send-btn" onclick="sendMessage()">Gửi →</button>
            </div>
        </div>
    </div>
</div>

<script>
    let stompClient = null;
    let currentUser = '';
    let currentRoom = 'room1';
    let mode = 'group'; // 'group' | 'private'

    /* ── CONNECT ── */
    function connect() {
      const username = document.getElementById('username-input').value.trim();
      const room = document.getElementById('room-input').value.trim() || 'room1';
      if (!username) return;

      currentUser = username;
      currentRoom = room;

      document.getElementById('connect-btn').disabled = true;
      document.getElementById('connect-btn').textContent = 'Connecting...';

      const socket = new SockJS('/ws?username=' + username);
      stompClient = Stomp.over(socket);
      stompClient.debug = null; // tắt log

      stompClient.connect({}, function(frame) {
        // Online
        setOnline(true);

        // Subscribe group chat
        stompClient.subscribe('/topic/room/' + currentRoom, function(msg) {
          const body = JSON.parse(msg.body);
          addMessage(body.sender, body.content, body.timestamp, body.sender === currentUser ? 'self' : 'other');
        });

        // Subscribe private
        stompClient.subscribe('/user/queue/private', function(msg) {
          const body = JSON.parse(msg.body);
          addMessage('🔒 ' + body.sender, body.content, body.timestamp, 'private');
        });

        // Show main screen
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-screen').classList.add('show');
        document.getElementById('current-user').textContent = currentUser;
        document.getElementById('room-tag').textContent = '#' + currentRoom;
        document.getElementById('chat-title').textContent = '#' + currentRoom;

        addMessage('system', 'Đã kết nối với room ' + currentRoom, now(), 'system');

      }, function(err) {
        setOnline(false);
        document.getElementById('connect-btn').disabled = false;
        document.getElementById('connect-btn').textContent = 'Connect';
        addSystemMsg('Kết nối thất bại!');
      });
    }

    /* ── SEND ── */
    function sendMessage() {
      const content = document.getElementById('msg-input').value.trim();
      if (!content || !stompClient) return;

      if (mode === 'group') {
        stompClient.send('/app/chat/' + currentRoom, {}, JSON.stringify({
          sender: currentUser,
          content: content,
          room: currentRoom
        }));
      } else {
        const receiver = document.getElementById('receiver-input').value.trim();
        if (!receiver) {
          document.getElementById('receiver-input').focus();
          return;
        }
        stompClient.send('/app/private', {}, JSON.stringify({
          sender: currentUser,
          receiver: receiver,
          content: content
        }));
        // Hiển thị cho chính mình
        addMessage('🔒 Bạn → ' + receiver, content, now(), 'private');
      }

      document.getElementById('msg-input').value = '';
    }

    /* ── UI HELPERS ── */
    function addMessage(sender, content, timestamp, type) {
      const box = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + type;

      if (type !== 'system') {
        div.innerHTML = `
          <div class="msg-meta">${sender} · ${formatTime(timestamp)}</div>
          <div class="msg-bubble">${escHtml(content)}</div>`;
      } else {
        div.innerHTML = `<div class="msg-bubble">${escHtml(content)}</div>`;
      }

      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function setTab(t) {
      mode = t;
      document.getElementById('tab-group').classList.toggle('active', t === 'group');
      document.getElementById('tab-private').classList.toggle('active', t === 'private');
      document.getElementById('private-row').classList.toggle('show', t === 'private');
      document.getElementById('send-btn').classList.toggle('private', t === 'private');
      document.getElementById('chat-sub').textContent = t === 'group' ? 'group chat' : 'private message';
      document.getElementById('msg-input').focus();
    }

    function setOnline(on) {
      document.getElementById('dot').classList.toggle('online', on);
      document.getElementById('status-text').textContent = on ? currentUser + ' · online' : 'disconnected';
    }

    function now() { return new Date().toISOString(); }

    function formatTime(ts) {
      try {
        const d = new Date(ts);
        return d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
      } catch { return ''; }
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
